<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เข้าสู่ระบบ — ระบบประเมินความเสี่ยงนักศึกษา</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Sarabun', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #e8f4f8 0%, #d6eaf8 100%);
      display: flex; align-items: center; justify-content: center;
      padding: 1rem;
    }
    .card {
      background: white; border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 2.5rem 2rem; width: 100%; max-width: 400px;
    }
    .logo { text-align: center; margin-bottom: 2rem; }
    .logo-icon {
      width: 64px; height: 64px; border-radius: 16px;
      background: #2980b9; display: inline-flex;
      align-items: center; justify-content: center;
      font-size: 28px; margin-bottom: 1rem;
    }
    h1 { font-size: 1.3rem; color: #1a3a4a; font-weight: 600; }
    p.sub { font-size: 0.85rem; color: #7f8c8d; margin-top: 4px; }
    label { display: block; font-size: 0.85rem; color: #4a5568; margin-bottom: 6px; font-weight: 500; }
    input {
      width: 100%; padding: 0.7rem 1rem; border: 1.5px solid #e2e8f0;
      border-radius: 8px; font-size: 1rem; font-family: inherit;
      transition: border-color 0.2s;
    }
    input:focus { outline: none; border-color: #2980b9; }
    .field { margin-bottom: 1.2rem; }
    .error {
      background: #fdecea; border: 1px solid #f5c6c6;
      color: #c0392b; padding: 0.7rem 1rem;
      border-radius: 8px; font-size: 0.85rem; margin-bottom: 1rem;
    }
    button {
      width: 100%; padding: 0.8rem; background: #2980b9;
      color: white; border: none; border-radius: 8px;
      font-size: 1rem; font-family: inherit;
      cursor: pointer; font-weight: 500; transition: background 0.2s;
    }
    button:hover { background: #2471a3; }
    .hint {
      margin-top: 1.5rem; padding: 1rem;
      background: #f0f7ff; border-radius: 8px; font-size: 0.8rem; color: #5a7a8a;
    }
    .hint strong { display: block; margin-bottom: 4px; color: #2980b9; }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">🎓</div>
      <h1>ระบบประเมินความเสี่ยงนักศึกษา</h1>
      <p class="sub">สำหรับอาจารย์ที่ปรึกษาเท่านั้น</p>
    </div>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="post" action="/login">
      <div class="field">
        <label>รหัสอาจารย์</label>
        <input type="text" name="teacher_id" placeholder="เช่น T001" required autocomplete="username">
      </div>
      <div class="field">
        <label>รหัสผ่าน</label>
        <input type="password" name="password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit">เข้าสู่ระบบ</button>
    </form>

    <div class="hint">
      <strong>บัญชีทดสอบ</strong>
      รหัสอาจารย์: T001 &nbsp;|&nbsp; รหัสผ่าน: 1234<br>
      รหัสอาจารย์: T002 &nbsp;|&nbsp; รหัสผ่าน: 5678
    </div>
  </div>
</body>
</html>
