<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เข้าสู่ระบบ — ระบบประเมินความเสี่ยงการพ้นสภาพนักศึกษา</title>

  <!-- 1. นำเข้าไฟล์ CSS ของ FirebaseUI เพื่อให้หน้าต่างสวยงาม -->
  <link type="text/css" rel="stylesheet" href="https://www.gstatic.com/firebasejs/ui/6.1.0/firebase-ui-auth.css" />

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Sarabun', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #e8f4f8 0%, #d6eaf8 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 400px;
    }

    .logo {
      text-align: center;
      margin-bottom: 2rem;
    }

    .logo-icon {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      background: #2980b9;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 1rem;
    }

    h1 {
      font-size: 1.3rem;
      color: #1a3a4a;
      font-weight: 600;
    }

    p.sub {
      font-size: 0.85rem;
      color: #7f8c8d;
      margin-top: 4px;
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">🎓</div>
      <h1>ระบบประเมินความเสี่ยงนักศึกษา</h1>
      <p class="sub">สำหรับอาจารย์ที่ปรึกษาเท่านั้น</p>
    </div>

    <!-- 2. กล่องเปล่าๆ ที่เดี๋ยวเราจะให้ FirebaseUI มาเสกหน้าต่าง Login ใส่ตรงนี้ -->
    <div id="firebaseui-auth-container"></div>

  </div>

  <!-- 3. นำเข้าไฟล์ JavaScript ของ Firebase (แบบ Compat เพื่อให้ใช้กับ FirebaseUI ได้ง่าย) -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/ui/6.1.0/firebase-ui-auth.js"></script>

  <script>
    // ==========================================
    // 🔑 4. นำกุญแจดอกที่ 1 (firebaseConfig) ของคุณมาวางทับตรงนี้
    // ==========================================
    const firebaseConfig = {
      apiKey: "AIzaSyBnmQ7tfc3stfCMfOAy-x56PWqRRoKo1uE",
      authDomain: "student-risk-auth.firebaseapp.com",
      projectId: "student-risk-auth",
      storageBucket: "student-risk-auth.firebasestorage.app",
      messagingSenderId: "985301039293",
      appId: "1:985301039293:web:f00622747543ced8921fd4",
      measurementId: "G-WN1SL25ZQ7"
    };

    // เริ่มต้นเชื่อมต่อ Firebase
    firebase.initializeApp(firebaseConfig);

    // สร้างตัวแปรสำหรับควบคุมหน้าต่าง UI
    var ui = new firebaseui.auth.AuthUI(firebase.auth());

    // ตั้งค่าหน้าต่าง Login
    var uiConfig = {
      callbacks: {
        // เมื่อล็อกอินสำเร็จ ให้ทำอะไรต่อ?
        signInSuccessWithAuthResult: function (authResult, redirectUrl) {
          // ขอ Token (บัตรผ่าน) จาก Firebase
          authResult.user.getIdToken().then(function (token) {
            // เอา Token ยัดใส่ Cookie ให้ FastAPI มองเห็น
            document.cookie = "session=" + token + "; path=/; max-age=3600";
            // สั่งเปลี่ยนหน้าไปที่ Dashboard
            window.location.href = "/dashboard";
          });
          // คืนค่า false เพื่อไม่ให้ UI มัน redirect เองมั่วๆ เราจะจัดการ redirect เองด้านบน
          return false;
        }
      },
      // เลือกวิธีการล็อกอิน (เราใช้แค่ Email)
      signInOptions: [
        {
          provider: firebase.auth.EmailAuthProvider.PROVIDER_ID,
          requireDisplayName: false, // ไม่ต้องถามชื่อ
          disableSignUp: {
            status: true, // 🌟 ล็อกไม่ให้มีปุ่มสมัครสมาชิกใหม่ (ป้องกันคนนอก)
            helpLink: "mailto:admin@your-school.ac.th" // ถ้าใครอยากขอรหัส ให้คลิกเมล์นี้ (แก้เมล์ได้)
          }
        }
      ],
    };

    // สั่งให้หน้าต่าง UI ปรากฏตัวขึ้นมาในกล่อง <div id="firebaseui-auth-container">
    ui.start('#firebaseui-auth-container', uiConfig);
  </script>
</body>

</html>
